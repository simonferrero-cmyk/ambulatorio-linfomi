<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ambulatorio Linfomi – Turni 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #F0F4FA; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── FIREBASE ──────────────────────────────────────────────────────────────────
const FIREBASE_URL = "https://ambulatorio-linfoproliferative-default-rtdb.europe-west1.firebasedatabase.app";
const DB_PATH = "/ambulatorio.json";

async function saveAll(schedules, notifications) {
  try {
    await fetch(FIREBASE_URL + DB_PATH, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ schedules, notifications }),
    });
  } catch(e) { console.error("Errore salvataggio:", e); }
}

async function loadAll() {
  try {
    const r = await fetch(FIREBASE_URL + DB_PATH);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// ── FESTIVITÀ ─────────────────────────────────────────────────────────────────
const HOLIDAYS = new Set(["2026-06-02","2026-06-24","2026-08-15","2026-11-01","2026-12-08","2026-12-25","2026-12-26"]);
const HOLIDAY_NAMES = {"2026-06-02":"Festa della Repubblica","2026-06-24":"San Giovanni Battista","2026-08-15":"Ferragosto","2026-11-01":"Ognissanti","2026-12-08":"Immacolata","2026-12-25":"Natale","2026-12-26":"Santo Stefano"};
const isHoliday = d => HOLIDAYS.has(d);
const holidayName = d => HOLIDAY_NAMES[d] || "Festività";

// ── COSTANTI ──────────────────────────────────────────────────────────────────
const DOCTORS = [
  { id:1, name:"Federica Cavallo",  initials:"FC", color:"#E74C3C", active:false },
  { id:2, name:"Simone Ferrero",    initials:"SF", color:"#1ABC9C", active:true  },
  { id:3, name:"Michele Clerico",   initials:"MC", color:"#3498DB", active:true  },
  { id:4, name:"Simone Ragaini",    initials:"SR", color:"#E67E22", active:true  },
  { id:5, name:"Chiara Consoli",    initials:"CC", color:"#9B59B6", active:true  },
];
const SHIFT_LABELS = {
  la:  { label:"Linfomi A",      bg:"#FFF0F0", border:"#E74C3C", text:"#C0392B" },
  lb:  { label:"Linfomi B",      bg:"#EBF5FB", border:"#3498DB", text:"#1A5276" },
  pv:  { label:"Prime Visite 3", bg:"#F0FFF4", border:"#27AE60", text:"#1E8449" },
  bom: { label:"Turno BOM",      bg:"#FFFBEA", border:"#F39C12", text:"#9A6600" },
};
const WEEKLY_TEMPLATE = [
  { day:1, period:"mattina",    shift:"la",  doctorId:3 },
  { day:1, period:"pomeriggio", shift:"lb",  doctorId:4 },
  { day:2, period:"mattina",    shift:"la",  doctorId:3 },
  { day:2, period:"mattina",    shift:"bom", doctorId:null },
  { day:2, period:"pomeriggio", shift:"lb",  doctorId:5 },
  { day:3, period:"mattina",    shift:"lb",  doctorId:2 },
  { day:3, period:"pomeriggio", shift:"la",  doctorId:4 },
  { day:4, period:"mattina",    shift:"pv",  doctorId:2 },
  { day:4, period:"mattina",    shift:"lb",  doctorId:2 },
  { day:5, period:"mattina",    shift:"la",  doctorId:5 },
  { day:5, period:"pomeriggio", shift:"pv",  doctorId:5 },
];
const MONTHS = [
  { year:2026, month:5,  label:"Giugno 2026"    },
  { year:2026, month:6,  label:"Luglio 2026"    },
  { year:2026, month:7,  label:"Agosto 2026"    },
  { year:2026, month:8,  label:"Settembre 2026" },
  { year:2026, month:9,  label:"Ottobre 2026"   },
  { year:2026, month:10, label:"Novembre 2026"  },
  { year:2026, month:11, label:"Dicembre 2026"  },
];
const MONTH_SHORT = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const DAY_NAMES_FULL = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
const ABSENCE_REASONS = ["Ferie","Congresso","Malattia","Altro"];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const getDoctor = id => DOCTORS.find(d => d.id === id);
const pad = n => String(n).padStart(2,"0");
const dateKey = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const todayKey = dateKey(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

function generateMonthSlots(year, month) {
  const days = new Date(year, month+1, 0).getDate();
  const result = {};
  for (let d=1; d<=days; d++) {
    const date = new Date(year, month, d);
    const dow  = date.getDay();
    const key  = dateKey(year, month, d);
    const wk   = dow===0||dow===6;
    const hol  = isHoliday(key);
    result[key] = {
      date, day:d, dayName:DAY_NAMES_FULL[dow], dow, month, year,
      weekend:wk, holiday:hol,
      holidayName: hol ? holidayName(key) : null,
      slots: (!wk && !hol) ? WEEKLY_TEMPLATE.filter(t=>t.day===dow).map(t=>({...t, refused:false})) : [],
    };
  }
  return result;
}

function buildGridCells(year, month) {
  const cells = [];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDow = (new Date(year, month, 1).getDay()+6)%7;
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(dateKey(year, month, d));
  while (cells.length%7!==0) cells.push(null);
  return cells;
}

const countEmptySlots = md => { let c=0; Object.values(md).forEach(d=>d.slots.forEach(s=>{if(!s.doctorId)c++;})); return c; };
const hasEmptySlots = md => Object.values(md).some(d=>d.slots.some(s=>!s.doctorId));

function getWeeksInRange(allSchedules) {
  const allWorkdays = [];
  MONTHS.forEach(({year,month}) => {
    const md = allSchedules[`${year}-${month}`];
    Object.keys(md).filter(k=>!md[k].weekend&&!md[k].holiday&&k>=todayKey).sort().forEach(k=>allWorkdays.push(k));
  });
  const weeks = {};
  allWorkdays.forEach(dk => {
    const d = new Date(dk);
    const mon = new Date(d);
    mon.setDate(d.getDate()-((d.getDay()+6)%7));
    const wk = dateKey(mon.getFullYear(), mon.getMonth(), mon.getDate());
    if (!weeks[wk]) weeks[wk] = { monKey:wk, days:[] };
    weeks[wk].days.push(dk);
  });
  return Object.values(weeks).sort((a,b)=>a.monKey<b.monKey?-1:1);
}

function computeStats(allSchedules, notifications) {
  const stats = {};
  DOCTORS.forEach(d => { stats[d.id] = { name:d.name, color:d.color, initials:d.initials, byMonth:{}, total:0, swapsRequested:0, swapsReceived:0, absences:0 }; });
  MONTHS.forEach(({year,month}) => {
    const mKey=`${year}-${month}`, md=allSchedules[mKey], mLabel=`${MONTH_SHORT[month]} ${year}`;
    Object.values(md).forEach(day => {
      day.slots.forEach(slot => {
        if (slot.doctorId) {
          if (!stats[slot.doctorId].byMonth[mLabel]) stats[slot.doctorId].byMonth[mLabel]=0;
          stats[slot.doctorId].byMonth[mLabel]++;
          stats[slot.doctorId].total++;
        }
        if (slot.refused && slot.refusedBy) stats[slot.refusedBy].absences++;
      });
    });
  });
  notifications.forEach(n => {
    if (n.fromId && stats[n.fromId]) stats[n.fromId].swapsRequested++;
    if (n.toId   && stats[n.toId])   stats[n.toId].swapsReceived++;
  });
  return stats;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [loggedInId, setLoggedInId]     = useState(null);
  const [view, setView]                 = useState("calendar");
  const [calView, setCalView]           = useState("month");
  const [weekStart, setWeekStart]       = useState(()=>{ const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); d.setHours(0,0,0,0); return d; });
  const [selectedMonthIdx, setMonthIdx] = useState(0);
  const [allSchedules, setAllSchedules] = useState(() => {
    const init = {};
    MONTHS.forEach(({year,month}) => { init[`${year}-${month}`] = generateMonthSlots(year,month); });
    return init;
  });
  const [storageLoaded, setStorageLoaded] = useState(false);
  const [swapModal, setSwapModal]         = useState(null);
  const [absenceModal, setAbsenceModal]   = useState(null);
  const [notifications, setNotifications] = useState([]);
  const [showNotif, setShowNotif]         = useState(false);
  const [toast, setToast]                 = useState(null);
  const [selectedDate, setSelectedDate]   = useState(null);

  const me       = getDoctor(loggedInId);
  const curKey   = `${MONTHS[selectedMonthIdx].year}-${MONTHS[selectedMonthIdx].month}`;
  const monthData = allSchedules[curKey];
  const unread    = notifications.filter(n=>!n.read).length;
  const emptyAlert = hasEmptySlots(monthData);
  const emptyCount = countEmptySlots(monthData);
  const {year, month} = MONTHS[selectedMonthIdx];
  const stats  = useMemo(()=>computeStats(allSchedules,notifications),[allSchedules,notifications]);
  const weeks  = useMemo(()=>getWeeksInRange(allSchedules),[allSchedules]);

  function showToast(msg, color="#27AE60") { setToast({msg,color}); setTimeout(()=>setToast(null),3200); }

  function updateSchedule(updater) {
    setAllSchedules(prev => { const next=JSON.parse(JSON.stringify(prev)); updater(next); return next; });
  }

  useEffect(() => {
    async function loadData() {
      const data = await loadAll();
      if (data) {
        if (data.schedules) {
          setAllSchedules(prev => {
            const merged = JSON.parse(JSON.stringify(prev));
            MONTHS.forEach(({year,month}) => {
              const mKey = `${year}-${month}`;
              if (data.schedules[mKey]) {
                Object.keys(merged[mKey]).forEach(dk => {
                  if (data.schedules[mKey][dk]) merged[mKey][dk].slots = data.schedules[mKey][dk].slots;
                });
              }
            });
            return merged;
          });
        }
        if (data.notifications) setNotifications(data.notifications);
      }
      setStorageLoaded(true);
    }
    loadData();
    const interval = setInterval(async () => {
      const data = await loadAll();
      if (!data) return;
      if (data.schedules) {
        setAllSchedules(prev => {
          const merged = JSON.parse(JSON.stringify(prev));
          MONTHS.forEach(({year,month}) => {
            const mKey = `${year}-${month}`;
            if (data.schedules[mKey]) {
              Object.keys(merged[mKey]).forEach(dk => {
                if (data.schedules[mKey][dk]) merged[mKey][dk].slots = data.schedules[mKey][dk].slots;
              });
            }
          });
          return merged;
        });
      }
      if (data.notifications) setNotifications(data.notifications);
    }, 15000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    if (!storageLoaded) return;
    saveAll(allSchedules, notifications);
  }, [allSchedules, notifications, storageLoaded]);

  function refuseRange(fromDate, toDate, reason) {
    updateSchedule(next => {
      MONTHS.forEach(({year,month}) => {
        const mKey=`${year}-${month}`;
        Object.keys(next[mKey]).forEach(dk => {
          if (dk<fromDate||dk>toDate) return;
          next[mKey][dk].slots.forEach(slot => {
            if (slot.doctorId===loggedInId) { slot.refusedBy=loggedInId; slot.refuseReason=reason; slot.refused=true; slot.doctorId=null; }
          });
        });
      });
    });
    setAbsenceModal(null);
    showToast("Assenza registrata.", "#E67E22");
  }

  function assignSelf(dk, si) {
    updateSchedule(next => {
      const mKey=Object.keys(next).find(k=>next[k][dk]);
      if (mKey) { next[mKey][dk].slots[si].doctorId=loggedInId; next[mKey][dk].slots[si].refused=false; }
    });
    showToast("Slot assegnato!");
  }

  function getSlotsOfDoctor(doctorId) {
    const result=[];
    MONTHS.forEach(({year,month}) => {
      const mKey=`${year}-${month}`;
      Object.keys(allSchedules[mKey]).forEach(dk => {
        allSchedules[mKey][dk].slots.forEach((s,si) => {
          if (s.doctorId===doctorId) result.push({mKey,dk,si,dayInfo:allSchedules[mKey][dk],slot:s});
        });
      });
    });
    return result;
  }

  function requestSwap(fromDk, fromSi, toSlotInfo) {
    const fromSlot=monthData[fromDk].slots[fromSi], fromDoc=getDoctor(fromSlot.doctorId), toDoc=getDoctor(toSlotInfo.slot.doctorId);
    const fi=SHIFT_LABELS[fromSlot.shift], ti=SHIFT_LABELS[toSlotInfo.slot.shift], fd=monthData[fromDk];
    setNotifications(prev => [{
      id:Date.now(), type:"swap",
      text:`🔄 ${fromDoc.name} propone cambio con ${toDoc.name}`,
      detail:`${fd.dayName} ${fd.day} · ${fromSlot.period} · ${fi.label}  ⇄  ${toSlotInfo.dayInfo.dayName} ${toSlotInfo.dayInfo.day} · ${toSlotInfo.slot.period} · ${ti.label}`,
      fromId:fromSlot.doctorId, toId:toSlotInfo.slot.doctorId,
      fromDk, fromSi, fromMKey:curKey,
      toDk:toSlotInfo.dk, toSi:toSlotInfo.si, toMKey:toSlotInfo.mKey,
      read:false,
    }, ...prev]);
    showToast("Proposta di cambio inviata!"); setSwapModal(null);
  }

  function approveSwap(notif) {
    updateSchedule(next => {
      const a=next[notif.fromMKey][notif.fromDk].slots[notif.fromSi];
      const b=next[notif.toMKey][notif.toDk].slots[notif.toSi];
      [a.doctorId,b.doctorId]=[b.doctorId,a.doctorId];
    });
    setNotifications(prev=>prev.map(n=>n.id===notif.id?{...n,read:true,approved:true}:n));
    showToast("Cambio effettuato ✓");
  }

  if (!storageLoaded) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1A2744 0%,#2C3E6B 100%)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>🏥</div>
      <div style={{color:"#fff",fontWeight:700,fontSize:18}}>Ambulatorio Linfomi</div>
      <div style={{color:"rgba(255,255,255,0.6)",fontSize:14}}>Caricamento in corso...</div>
      <div style={{width:36,height:36,border:"4px solid rgba(255,255,255,0.2)",borderTop:"4px solid #fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  if (!loggedInId) return <LoginScreen onLogin={setLoggedInId}/>;

  return (
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"#F0F4FA",minHeight:"100vh"}}>
      <header style={{background:"#1A2744",color:"#fff",padding:"0 16px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 10px #0004",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20}}>🏥</span>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>Ambulatorio Linfomi</div>
            <div style={{fontSize:10,opacity:0.6}}>Torino · 2026</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          {["calendar","absences","stats"].map((v,i)=>{
            const labels=["📅 Turni","🏖️ Assenze","📊 Stats"];
            return <button key={v} onClick={()=>setView(v)} style={{background:view===v?"rgba(255,255,255,0.22)":"rgba(255,255,255,0.07)",border:"none",color:"#fff",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:11,fontWeight:600}}>{labels[i]}</button>;
          })}
          {emptyAlert&&view==="calendar"&&<div style={{background:"#E74C3C",color:"#fff",borderRadius:7,padding:"4px 7px",fontSize:10,fontWeight:800}}>🚨{emptyCount}</div>}
          <div style={{position:"relative"}}>
            <button onClick={()=>setShowNotif(p=>!p)} style={{background:"rgba(255,255,255,0.07)",border:"none",color:"#fff",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:14}}>
              🔔{unread>0&&<span style={{background:"#E74C3C",borderRadius:"50%",padding:"0 4px",fontSize:9,fontWeight:700,marginLeft:2}}>{unread}</span>}
            </button>
            {showNotif&&(
              <div style={{position:"absolute",right:0,top:44,background:"#fff",borderRadius:12,boxShadow:"0 8px 32px #0003",width:340,zIndex:300,maxHeight:420,overflowY:"auto"}}>
                <div style={{padding:"10px 14px",borderBottom:"1px solid #eee",fontWeight:700,color:"#1A2744",fontSize:13}}>Notifiche</div>
                {notifications.length===0&&<div style={{padding:16,color:"#aaa",textAlign:"center"}}>Nessuna notifica</div>}
                {notifications.map(n=>(
                  <div key={n.id} style={{padding:"10px 14px",borderBottom:"1px solid #F8F8F8",background:n.read?"#fff":"#EBF5FB"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#1A2744",marginBottom:3}}>{n.text}</div>
                    {n.detail&&<div style={{fontSize:10,color:"#666",marginBottom:6,background:"#F8FAFC",borderRadius:5,padding:"4px 8px"}}>{n.detail}</div>}
                    {!n.approved&&!n.read&&n.type==="swap"&&(
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>approveSwap(n)} style={{background:"#27AE60",color:"#fff",border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>✓ Approva</button>
                        <button onClick={()=>setNotifications(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x))} style={{background:"#FDECEA",color:"#E74C3C",border:"none",borderRadius:5,padding:"4px 8px",cursor:"pointer",fontSize:11}}>✕ Rifiuta</button>
                      </div>
                    )}
                    {n.approved&&<span style={{fontSize:10,color:"#27AE60",fontWeight:700}}>✓ Cambio effettuato</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:me.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:10}}>{me.initials}</div>
            <button onClick={()=>{setLoggedInId(null);setSelectedDate(null);setView("calendar");}} style={{background:"rgba(255,255,255,0.07)",border:"none",color:"#fff",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontSize:10}}>Esci</button>
          </div>
        </div>
      </header>

      {view==="calendar"&&<CalendarView monthData={monthData} allSchedules={allSchedules} selectedMonthIdx={selectedMonthIdx} setMonthIdx={setMonthIdx} selectedDate={selectedDate} setSelectedDate={setSelectedDate} loggedInId={loggedInId} me={me} year={year} month={month} emptyAlert={emptyAlert} emptyCount={emptyCount} onAssignSelf={(dk,si)=>assignSelf(dk,si)} onSwapRequest={(dk,si)=>setSwapModal({fromDk:dk,fromSi:si})} onRefuse={(dk,si)=>setAbsenceModal({mode:"single",dk,si})} onCoverSlot={(dk,si)=>assignSelf(dk,si)} calView={calView} setCalView={setCalView} weekStart={weekStart} setWeekStart={setWeekStart}/>}
      {view==="absences"&&<AbsencesView allSchedules={allSchedules} loggedInId={loggedInId} me={me} weeks={weeks} updateSchedule={updateSchedule} showToast={showToast}/>}
      {view==="stats"&&<StatsView stats={stats} allSchedules={allSchedules} notifications={notifications}/>}

      {swapModal&&<SwapModal fromDk={swapModal.fromDk} fromSi={swapModal.fromSi} monthData={monthData} loggedInId={loggedInId} getSlotsOfDoctor={getSlotsOfDoctor} onRequest={(toSlotInfo)=>requestSwap(swapModal.fromDk,swapModal.fromSi,toSlotInfo)} onClose={()=>setSwapModal(null)}/>}
      {absenceModal&&<AbsenceModal slot={absenceModal.dk?monthData[absenceModal.dk]?.slots[absenceModal.si]:null} dayInfo={absenceModal.dk?monthData[absenceModal.dk]:null} onConfirm={(from,to,reason)=>refuseRange(from,to,reason)} onClose={()=>setAbsenceModal(null)}/>}
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",borderRadius:12,padding:"11px 22px",fontWeight:700,fontSize:13,boxShadow:"0 4px 20px #0003",zIndex:500}}>{toast.msg}</div>}
    </div>
  );
}

function LoginScreen({onLogin}) {
  const [selected,setSelected]=useState(null);
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1A2744 0%,#2C3E6B 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:"30px 26px",width:"100%",maxWidth:390,boxShadow:"0 20px 60px #0005"}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{fontSize:42,marginBottom:7}}>🏥</div>
          <div style={{fontWeight:800,fontSize:19,color:"#1A2744"}}>Ambulatorio Linfomi</div>
          <div style={{color:"#888",fontSize:12,marginTop:3}}>Torino · Turni 2026</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:18}}>
          {DOCTORS.map(d=>(
            <button key={d.id} onClick={()=>d.active&&setSelected(d.id)} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 15px",borderRadius:11,border:`2px solid ${selected===d.id?d.color:"#E8EEF5"}`,background:selected===d.id?`${d.color}18`:"#FAFAFA",cursor:d.active?"pointer":"not-allowed",opacity:d.active?1:0.45}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:d.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>{d.initials}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:"#1A2744"}}>{d.name}</div>
                {!d.active&&<div style={{fontSize:10,color:"#aaa"}}>Rientro: luglio 2026</div>}
              </div>
              {selected===d.id&&<span style={{marginLeft:"auto",color:d.color,fontSize:17}}>✓</span>}
            </button>
          ))}
        </div>
        <button onClick={()=>selected&&onLogin(selected)} disabled={!selected} style={{width:"100%",padding:12,background:selected?"#1A2744":"#ccc",color:"#fff",border:"none",borderRadius:11,fontWeight:700,fontSize:14,cursor:selected?"pointer":"not-allowed"}}>Accedi →</button>
      </div>
    </div>
  );

  function getDayData(date) {
    const y=date.getFullYear(),m=date.getMonth(),d=date.getDate();
    const key=`${y}-${pad(m+1)}-${pad(d)}`, mKey=`${y}-${m}`;
    const md=allSchedules[mKey];
    return md?{key,info:md[key]}:{key,info:null};
  }
  function navWeek(dir) { setWeekStart(prev=>{ const d=new Date(prev); d.setDate(d.getDate()+dir*7); return d; }); }
  const monDate=days[0],sunDate=days[6];
  const monStr=`${monDate.getDate()} ${MONTH_SHORT[monDate.getMonth()]}`;
  const sunStr=`${sunDate.getDate()} ${MONTH_SHORT[sunDate.getMonth()]} ${sunDate.getFullYear()}`;

      </div>

        <div style={{padding:"7px 3px"}}/>
        {days.map((d,i)=>{
          const {info}=getDayData(d);

            <div style={{fontSize:9,fontWeight:600,color:isWk?"#4B5563":"#93C5FD"}}>{"LunMarMerGioVenSabDom".match(/.{3}/g)[i]}</div>
            <div style={{fontSize:isWk?11:14,fontWeight:700,color:isToday?"#3B82F6":info?.holiday?"#F59E0B":isWk?"#4B5563":"#fff",marginTop:2}}>{d.getDate()}</div>

function AbsencesView({allSchedules,loggedInId,me,weeks,updateSchedule,showToast}) {
  const [mode,setMode]=useState("single");
  const [reason,setReason]=useState("Ferie");
  const [customReason,setCustomReason]=useState("");
  const [fromDate,setFromDate]=useState("");
  const [toDate,setToDate]=useState("");
  const [selectedWeeks,setSelectedWeeks]=useState([]);
  const myUpcoming=[];
  MONTHS.forEach(({year,month})=>{
    const mKey=`${year}-${month}`;
    Object.keys(allSchedules[mKey]).filter(dk=>dk>=todayKey).sort().forEach(dk=>{
      allSchedules[mKey][dk].slots.forEach((s,si)=>{ if(s.doctorId===loggedInId) myUpcoming.push({mKey,dk,si,dayInfo:allSchedules[mKey][dk],slot:s}); });
    });
  });
  function toggleWeek(wk) { setSelectedWeeks(prev=>prev.includes(wk)?prev.filter(w=>w!==wk):[...prev,wk]); }
  function doAbsence() {
    const fr=reason==="Altro"?(customReason||"Altro"):reason;
    let from="",to="";
    if(mode==="single"){from=fromDate;to=fromDate;}
    else if(mode==="range"){from=fromDate;to=toDate;}
    else if(mode==="weeks"&&selectedWeeks.length){
      const sorted=selectedWeeks.sort();
      const fw=weeks.find(w=>w.monKey===sorted[0]),lw=weeks.find(w=>w.monKey===sorted[sorted.length-1]);
      if(fw&&lw){from=fw.days[0];to=lw.days[lw.days.length-1];}
    }
    if(!from||!to) return;
    updateSchedule(next=>{
      MONTHS.forEach(({year,month})=>{
        const mKey=`${year}-${month}`;
        Object.keys(next[mKey]).forEach(dk=>{
          if(dk<from||dk>to) return;
          next[mKey][dk].slots.forEach(slot=>{ if(slot.doctorId===loggedInId){slot.refusedBy=loggedInId;slot.refuseReason=fr;slot.refused=true;slot.doctorId=null;} });
        });
      });
    });
    showToast("Assenza registrata.","#E67E22");
    setFromDate("");setToDate("");setSelectedWeeks([]);
  }
  const workdayDates=[];
  MONTHS.forEach(({year,month})=>{ Object.keys(allSchedules[`${year}-${month}`]).filter(k=>{const d=allSchedules[`${year}-${month}`][k];return !d.weekend&&!d.holiday&&k>=todayKey;}).forEach(k=>workdayDates.push(k)); });
  workdayDates.sort();
  const minDate=workdayDates[0]||"",maxDate=workdayDates[workdayDates.length-1]||"";
  const preview=[];
  let pFrom="",pTo="";
  if(mode==="single"){pFrom=fromDate;pTo=fromDate;}
  else if(mode==="range"){pFrom=fromDate;pTo=toDate;}

            </div>

          {mode==="range"&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:"#1A2744",marginBottom:5}}>Periodo</div><div style={{display:"flex",gap:8,alignItems:"center"}}><div style={{flex:1}}><div style={{fontSize:10,color:"#888",marginBottom:3}}>Da</div><input type="date" value={fromDate} min={minDate} max={maxDate} onChange={e=>setFromDate(e.target.value)} style={{padding:"8px 10px",border:"1.5px solid #E8EEF5",borderRadius:7,fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"}}/></div><div style={{fontSize:14,color:"#CBD5E1",marginTop:12}}>→</div><div style={{flex:1}}><div style={{fontSize:10,color:"#888",marginBottom:3}}>A</div><input type="date" value={toDate} min={fromDate||minDate} max={maxDate} onChange={e=>setToDate(e.target.value)} style={{padding:"8px 10px",border:"1.5px solid #E8EEF5",borderRadius:7,fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"}}/></div></div></div>}
          {mode==="weeks"&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:"#1A2744",marginBottom:7}}>Settimane</div>{Object.entries(weeksByMonth).map(([mLabel,mWeeks])=><div key={mLabel} style={{marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:"#888",marginBottom:5,textTransform:"uppercase"}}>{mLabel}</div><div style={{display:"flex",flexDirection:"column",gap:4}}>{mWeeks.map(wk=>{const isSel=selectedWeeks.includes(wk.monKey);const mon=new Date(wk.monKey);const fri=new Date(wk.days[wk.days.length-1]);const myCount=wk.days.reduce((acc,dk)=>{MONTHS.forEach(({year,month})=>{const md=allSchedules[`${year}-${month}`];if(md&&md[dk]) acc+=md[dk].slots.filter(s=>s.doctorId===loggedInId).length;});return acc;},0);return <button key={wk.monKey} onClick={()=>toggleWeek(wk.monKey)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",border:`2px solid ${isSel?"#E74C3C":"#E8EEF5"}`,borderRadius:9,background:isSel?"#FDECEA":"#FAFAFA",cursor:"pointer",textAlign:"left"}}><div style={{width:18,height:18,borderRadius:4,border:`2px solid ${isSel?"#E74C3C":"#CBD5E1"}`,background:isSel?"#E74C3C":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{isSel&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:11,color:"#1A2744"}}>{mon.getDate()}–{fri.getDate()} {MONTH_SHORT[fri.getMonth()]}</div><div style={{fontSize:10,color:myCount>0?"#E67E22":"#aaa"}}>{myCount>0?`${myCount} tuoi turni`:"Nessun turno"}</div></div></button>;})</div></div>)}</div>}
          {preview.length>0&&<div style={{background:"#FFF8E1",border:"2px solid #FFD54F",borderRadius:8,padding:"10px 12px",marginBottom:12}}><div style={{fontWeight:700,fontSize:11,color:"#E65100",marginBottom:6}}>⚠️ {preview.length} turni che verranno liberati</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{preview.map((item,i)=>{const sl=SHIFT_LABELS[item.slot.shift];return <div key={i} style={{background:"#fff",border:"1px solid #FFD54F",borderRadius:6,padding:"3px 8px",fontSize:10}}><span style={{fontWeight:600,color:"#1A2744"}}>{item.dayInfo.dayName} {item.dayInfo.day}</span><span style={{color:"#888"}}> · {item.slot.period} · </span><span style={{fontWeight:600,color:sl.text}}>{sl.label}</span></div>;})} </div></div>}
          <button disabled={preview.length===0} onClick={doAbsence} style={{width:"100%",padding:11,background:preview.length>0?"#E74C3C":"#ccc",color:"#fff",border:"none",borderRadius:9,fontWeight:700,fontSize:13,cursor:preview.length>0?"pointer":"not-allowed"}}>🚫 Conferma assenza — {preview.length} slot liberati</button>
        </div>
      </div>
    </main>
  );

      <div style={{display:"flex",gap:7}}>
        <button onClick={onClose} style={{flex:1,padding:10,border:"1.5px solid #E8EEF5",borderRadius:8,background:"#fff",cursor:"pointer",fontWeight:600,fontSize:12}}>Annulla</button>
        {step===2&&<button disabled={!toSlot} onClick={()=>toSlot&&onRequest(toSlot)} style={{flex:2,padding:10,background:toSlot?"#1A2744":"#ccc",color:"#fff",border:"none",borderRadius:8,cursor:toSlot?"pointer":"not-allowed",fontWeight:700,fontSize:12}}>Invia proposta</button>}
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
