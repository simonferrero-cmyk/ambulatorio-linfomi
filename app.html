// ── FIREBASE ──────────────────────────────────────────────────────────────────
const FIREBASE_URL = "https://ambulatorio-linfoproliferative-default-rtdb.europe-west1.firebasedatabase.app/ambulatorio.json";

async function saveAll(data) {
  try {
    await fetch(FIREBASE_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
  } catch(e) { console.error("Save error:", e); }
}

async function loadAll() {
  try {
    const r = await fetch(FIREBASE_URL);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,"0");
const dk = (y,m,d) => y+"-"+pad(m+1)+"-"+pad(d);
const today = dk(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
const getDoc = id => DOCTORS.find(d => d.id === id);

function genMonth(year, month) {
  const days = new Date(year, month+1, 0).getDate();
  const result = {};
  for (let d=1; d<=days; d++) {
    const date = new Date(year, month, d);
    const dow = date.getDay();
    const key = dk(year, month, d);
    const wk = dow===0||dow===6;
    const hol = HOLIDAYS[key] || null;
    result[key] = {
      day:d, dayName:DN[dow], dow, month, year,
      weekend:wk, holiday:!!hol, holidayName:hol,
      slots: (!wk && !hol) ? WEEKLY.filter(t=>t.day===dow).map(t=>({...t})) : []
    };
  }
  return result;
}

function initSchedules() {
  const s = {};
  MONTHS.forEach(({year,month}) => { s[year+"-"+month] = genMonth(year, month); });
  return s;
}

function gridCells(year, month) {
  const cells = [];
  const days = new Date(year, month+1, 0).getDate();
  const firstDow = (new Date(year, month, 1).getDay()+6)%7;
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=days; d++) cells.push(dk(year,month,d));
  while (cells.length%7!==0) cells.push(null);
  return cells;
}

  weekStart: (() => {
    const d = new Date();
    d.setDate(d.getDate()-((d.getDay()+6)%7));

let saveTimeout = null;
function scheduleSave() {

  saveTimeout = setTimeout(() => {
    saveAll({ schedules: state.schedules, notifications: state.notifications });
  }, 1000);
}

// ── RENDER ENGINE ──────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k,v]) => {
      if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "className") e.className = v;
      else e.setAttribute(k, v);
    });
  }
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  });
  return e;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(buildApp());
}

// ── APP ───────────────────────────────────────────────────────────────────────
function buildApp() {
  if (!state.loaded) return buildLoading();
  if (!state.loggedInId) return buildLogin();
  const me = getDoc(state.loggedInId);
  const curKey = MONTHS[state.monthIdx].year+"-"+MONTHS[state.monthIdx].month;
  if (!state.schedules[curKey]) state.schedules[curKey] = genMonth(MONTHS[state.monthIdx].year, MONTHS[state.monthIdx].month);
  const monthData = state.schedules[curKey];

  return el("div", {style:{fontFamily:"system-ui,sans-serif",background:"#F0F4FA",minHeight:"100vh"}},
    buildHeader(me, monthData),
    state.view==="calendar" ? buildCalendar(me, monthData, curKey) :
    state.view==="absences" ? buildAbsences(me) :
    buildStats(),
    state.swapModal ? buildSwapModal(me, monthData) : null,
    state.absenceModal ? buildAbsenceModal(me, monthData) : null,
    state.toast ? buildToast() : null
  );
}

function buildCalendar(me, monthData, curKey) {

  // Switch mese/settimana
  const switchRow = el("div", {style:{display:"flex",gap:"6px",marginBottom:"12px"}});
  ["month","week"].forEach((v, i) => {
    switchRow.appendChild(el("button", {
      style:{padding:"5px 14px",borderRadius:"20px",border:"2px solid "+(state.calView===v?"#1A2744":"#E8EEF5"),background:state.calView===v?"#1A2744":"#fff",color:state.calView===v?"#fff":"#1A2744",fontWeight:"700",fontSize:"11px",cursor:"pointer"},
      onclick: () => { state.calView = v; render(); }
    }, i===0?"📅 Mese":"📋 Settimana"));
  });
  main.appendChild(switchRow);

  // Legenda
  const legend = el("div", {style:{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"10px"}});
  DOCTORS.forEach(d => {
    legend.appendChild(el("div", {style:{display:"flex",alignItems:"center",gap:"4px",background:"#fff",borderRadius:"20px",padding:"3px 10px",fontSize:"10px",fontWeight:"600",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",opacity:d.active?"1":"0.5"}},
      el("div", {style:{width:"8px",height:"8px",borderRadius:"50%",background:d.color}}),
      d.name,
      !d.active ? el("span", {style:{fontSize:"8px",color:"#aaa"}}, "(lug)") : null,
      d.id===state.loggedInId ? el("span", {style:{fontSize:"8px",background:d.color,color:"#fff",borderRadius:"3px",padding:"0 3px"}}, "TU") : null
    ));
  });
  main.appendChild(legend);

  if (state.calView === "week") {
    main.appendChild(buildWeekView(me));
  } else {
    main.appendChild(buildMonthView(me, monthData, curKey));
  }

  return main;
}

function buildMonthView(me, monthData, curKey) {
  const wrap = el("div", {});
  const {year, month} = MONTHS[state.monthIdx];

  // Selezione mese
  const monthSel = el("div", {style:{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"10px"}});
  MONTHS.forEach((m, i) => {
    const mKey = m.year+"-"+m.month;
    const ec = countEmpty(state.schedules[mKey]);
    const btn = el("button", {
      style:{padding:"5px 11px",borderRadius:"20px",border:"2px solid "+(state.monthIdx===i?"#1A2744":"#E8EEF5"),background:state.monthIdx===i?"#1A2744":"#fff",color:state.monthIdx===i?"#fff":"#1A2744",fontWeight:"600",fontSize:"11px",cursor:"pointer",position:"relative"},
      onclick: () => { state.monthIdx = i; state.selectedDate = null; render(); }
    }, m.label.split(" ")[0]);
    if (ec > 0) {
      btn.appendChild(el("span", {style:{position:"absolute",top:"-5px",right:"-5px",background:"#E74C3C",color:"#fff",borderRadius:"50%",width:"14px",height:"14px",fontSize:"8px",fontWeight:"800",display:"flex",alignItems:"center",justifyContent:"center"}}, String(ec)));
    }
    monthSel.appendChild(btn);
  });
  wrap.appendChild(monthSel);

  // Calendario
  const cal = el("div", {style:{background:"#fff",borderRadius:"14px",boxShadow:"0 2px 16px rgba(0,0,0,0.06)",overflow:"hidden",marginBottom:"12px"}});

  // Nav
  const nav = el("div", {style:{background:"#1A2744",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}});
  nav.appendChild(el("button", {style:{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",borderRadius:"6px",padding:"3px 12px",cursor:"pointer",fontSize:"16px",opacity:state.monthIdx===0?"0.3":"1"},onclick:()=>{if(state.monthIdx>0){state.monthIdx--;state.selectedDate=null;render();}}}, "‹"));
  nav.appendChild(el("div", {style:{fontWeight:"700",fontSize:"14px",color:"#fff"}}, MONTHS[state.monthIdx].label));
  nav.appendChild(el("button", {style:{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",borderRadius:"6px",padding:"3px 12px",cursor:"pointer",fontSize:"16px",opacity:state.monthIdx===MONTHS.length-1?"0.3":"1"},onclick:()=>{if(state.monthIdx<MONTHS.length-1){state.monthIdx++;state.selectedDate=null;render();}}}, "›"));
  cal.appendChild(nav);

  // Header giorni
  const hdr = el("div", {style:{display:"grid",gridTemplateColumns:"repeat(5,1.6fr) repeat(2,0.55fr)",background:"#2C3E6B"}});
  ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].forEach((d,i) => {
    hdr.appendChild(el("div", {style:{textAlign:"center",color:i>=5?"#4B5563":"#93C5FD",fontWeight:"700",fontSize:"10px",padding:"7px 0"}}, d));
  });
  cal.appendChild(hdr);

  // Celle
  const grid = el("div", {style:{display:"grid",gridTemplateColumns:"repeat(5,1.6fr) repeat(2,0.55fr)",gap:"1px",background:"#E8EEF5"}});
  gridCells(year, month).forEach((key, ci) => {
    if (!key) {
      grid.appendChild(el("div", {style:{background:"#F0F2F5",minHeight:"110px",minWidth:"0"}}));
      return;
    }
    const info = monthData[key];
    if (!info) { grid.appendChild(el("div", {style:{background:"#F0F2F5",minHeight:"110px"}})); return; }
    if (!info.slots) info.slots = [];

    if (info.weekend) {
      grid.appendChild(el("div", {style:{minHeight:"110px",background:"#EBEBEB",padding:"5px 2px",borderTop:"3px solid transparent",minWidth:"0",overflow:"hidden",display:"flex",flexDirection:"column",alignItems:"center"}},
        el("div", {style:{fontWeight:"400",fontSize:"11px",color:"#AAAAAA",textAlign:"center"}}, String(info.day))
      ));
      return;
    }

    const isHol = info.holiday;
    const slots = (info && info.slots) ? info.slots : [];
    const empties = slots.filter(s => !s.doctorId);
    const hasEmpty = empties.length > 0;
    const isSelected = state.selectedDate === key;
    const isToday = key === today;
    const clickable = !isHol && slots.length > 0;

    const cell = el("div", {
      style:{minHeight:"110px",background:isSelected?"#EFF6FF":isHol?"#FFFDE7":"#fff",padding:"6px 5px",cursor:clickable?"pointer":"default",borderTop:hasEmpty?"3px solid #E74C3C":isSelected?"3px solid #3498DB":isHol?"3px solid #F59E0B":"3px solid transparent",minWidth:"0",overflow:"hidden"},
      onclick: () => { if (clickable) { state.selectedDate = isSelected ? null : key; render(); } }
    });

    // Numero giorno
    const dayNum = el("div", {style:{display:"flex",alignItems:"center",gap:"2px",marginBottom:"3px"}});
    dayNum.appendChild(el("div", {style:{fontWeight:"700",fontSize:"14px",color:isToday?"#fff":isHol?"#92400E":"#1A2744",background:isToday?"#3498DB":"transparent",width:"24px",height:"24px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}}, String(info.day)));
    if (isHol) dayNum.appendChild(el("span", {style:{fontSize:"9px"}}, "🎉"));
    cell.appendChild(dayNum);

    if (isHol) {
      cell.appendChild(el("div", {style:{background:"#FEF3C7",border:"1px solid #F59E0B",borderRadius:"4px",padding:"2px 4px",marginBottom:"2px"}},
        el("div", {style:{fontSize:"8px",color:"#92400E",fontWeight:"700"}}, "🎉 Festività"),
        el("div", {style:{fontSize:"8px",color:"#B45309",fontWeight:"600"}}, info.holidayName)
      ));
    }

    if (hasEmpty && !isHol) {
      empties.forEach(s => {
        cell.appendChild(el("div", {style:{background:"#E74C3C",color:"#fff",borderRadius:"4px",padding:"2px 4px",marginBottom:"3px"}},
          el("div", {style:{display:"flex",alignItems:"center",gap:"2px"}},
            el("span", {style:{fontSize:"9px"}}, "🚨"),
            el("span", {style:{fontSize:"8px",fontWeight:"800"}}, "SCOPERTO")
          ),
          el("div", {style:{fontSize:"9px",fontWeight:"700"}}, SHIFTS[s.shift].label)
        ));
      });
    }

    if (!isHol) {
      slots.filter(s=>s.doctorId).slice(0,3).forEach(s => {
        const sl = SHIFTS[s.shift];
        const doc = getDoc(s.doctorId);
        const mine = s.doctorId === state.loggedInId;
        const badge = el("div", {style:{background:sl.bg,border:"2.5px solid "+(mine?me.color:sl.border),borderRadius:"6px",padding:"4px 5px",marginBottom:"3px",minWidth:"0"}},
          el("div", {style:{display:"flex",alignItems:"center",gap:"4px",marginBottom:"2px"}},
            el("span", {style:{width:"8px",height:"8px",borderRadius:"50%",background:doc.color,flexShrink:"0",display:"inline-block"}}),
            el("span", {style:{fontSize:"11px",fontWeight:"700",color:"#1A2744"}}, doc.initials),
            mine ? el("span", {style:{fontSize:"8px",background:me.color,color:"#fff",borderRadius:"3px",padding:"0 3px",flexShrink:"0"}}, "TU") : null
          ),
          el("div", {style:{fontSize:"10px",fontWeight:"700",color:sl.text,paddingLeft:"12px"}}, sl.label)
        );
        cell.appendChild(badge);
      });
    }

    grid.appendChild(cell);
  });
  cal.appendChild(grid);
  wrap.appendChild(cal);

  // Dettaglio giorno
  if (state.selectedDate && monthData[state.selectedDate]) {
    wrap.appendChild(buildDayDetail(me, monthData, state.selectedDate));
  }

  // Riepilogo miei turni
  wrap.appendChild(buildMyMonthSummary(me, monthData));

  // Alert scoperti
  const emptyCount = countEmpty(monthData);
  if (emptyCount > 0) {
    const alertBox = el("div", {style:{marginTop:"10px",background:"#FDECEA",border:"3px solid #E74C3C",borderRadius:"12px",padding:"12px 16px"}},
      el("div", {style:{fontWeight:"800",color:"#C0392B",marginBottom:"8px",fontSize:"13px"}}, "🚨 "+emptyCount+" slot scoperti")
    );
    Object.keys(monthData).forEach(key => {
      ((monthData[key] && monthData[key].slots) || []).filter(s=>!s.doctorId).forEach((s,i) => {
        const day = monthData[key];
        const sl = SHIFTS[s.shift];
        const idx = (monthData[key].slots||[]).indexOf(s);
        const row = el("div", {style:{background:"#fff",border:"2px solid #E74C3C",borderRadius:"8px",padding:"7px 12px",display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},
          el("span", {style:{fontSize:"14px"}}, "🚨"),
          el("div", {style:{flex:"1"}},
            el("div", {style:{fontWeight:"700",fontSize:"11px",color:"#C0392B"}}, day.dayName+" "+day.day+" — "+s.period),
            el("div", {style:{fontSize:"10px",color:"#666"}}, sl.label+(s.refusedBy?" · "+getDoc(s.refusedBy).name:"")+(s.refuseReason?" ("+s.refuseReason+")":""))
          ),
          el("button", {
            style:{background:"#27AE60",color:"#fff",border:"none",borderRadius:"6px",padding:"5px 9px",cursor:"pointer",fontSize:"10px",fontWeight:"700",flexShrink:"0"},
            onclick: () => { assignSelf(key, idx); }
          }, "Copri")
        );
        alertBox.appendChild(row);
      });
    });
    wrap.appendChild(alertBox);
  }

  return wrap;
}

    ));

    row.appendChild(el("div", {style:{background:period==="mattina"?"#F0F7FF":"#FDF4FF",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 2px",borderRight:"1px solid #E8EEF5"}},

      el("span", {style:{fontSize:"7px",fontWeight:"700",color:"#888",textTransform:"uppercase",marginTop:"2px",textAlign:"center"}}, period==="mattina"?"Mat":"Pom")
    ));
    days.forEach((d,di) => {
      const key = dk(d.getFullYear(), d.getMonth(), d.getDate());
      const mKey = d.getFullYear()+"-"+d.getMonth();
      const info = state.schedules[mKey] && state.schedules[mKey][key];
      const isWk = di>=5;
      const isHol = info&&info.holiday;
      if (isWk||!info||isHol) {
        row.appendChild(el("div", {style:{background:isHol?"#FFFDE7":isWk?"#F5F5F7":"#FAFAFA",padding:"3px",borderRight:"1px solid #F1F5F9",minHeight:"68px"}}));

          });
          if (isEmpty) {
            badge.appendChild(el("div", {style:{fontSize:"8px",fontWeight:"800",color:"#E74C3C"}}, "🚨 SCOPERTO"));
            badge.appendChild(el("div", {style:{fontSize:"8px",fontWeight:"700",color:"#C0392B",marginTop:"1px"}}, sl.label));
          } else {
            badge.appendChild(el("div", {style:{display:"flex",alignItems:"center",gap:"3px",marginBottom:"2px"}},

              el("span", {style:{fontSize:"10px",fontWeight:"700",color:"#1A2744"}}, doc.initials),
              isMe ? el("span", {style:{fontSize:"7px",background:me.color,color:"#fff",borderRadius:"3px",padding:"0 3px"}}, "TU") : null
            ));
            badge.appendChild(el("div", {style:{fontSize:"9px",fontWeight:"700",color:sl.text,paddingLeft:"10px"}}, sl.label));
            if (isMe) badge.appendChild(el("div", {style:{fontSize:"7px",color:"#aaa",paddingLeft:"10px"}}, "🔄 cambio"));
          }
          cell.appendChild(badge);
        });
      }
      row.appendChild(cell);
    });
    wrap.appendChild(row);
  });

  return wrap;
}

function buildAbsences(me) {
  const main = el("main", {style:{padding:"14px 16px",maxWidth:"700px",margin:"0 auto"}});

  // Stato locale per il form assenze
  if (!state.absenceForm) state.absenceForm = {
    mode: "single", reason: "Ferie", customReason: "",
    fromDate: "", toDate: "", selectedWeeks: []
  };
  const form = state.absenceForm;

  // Tutti i turni futuri del medico
  const myUpcoming = [];
  MONTHS.forEach(({year,month}) => {
    const mKey = year+"-"+month;
    Object.keys(state.schedules[mKey]).filter(k=>k>=today).sort().forEach(key => {
      (state.schedules[mKey][key].slots||[]).forEach((s,si) => {
        if (s.doctorId===state.loggedInId) myUpcoming.push({mKey,key,si,dayInfo:state.schedules[mKey][key],slot:s});
      });
    });
  });

  // Calcola anteprima slot che verranno liberati
  function getPreview() {
    let from = "", to = "";
    if (form.mode==="single") { from=form.fromDate; to=form.fromDate; }
    else if (form.mode==="range") { from=form.fromDate; to=form.toDate; }
    else if (form.mode==="weeks" && form.selectedWeeks.length) {
      const sorted = [...form.selectedWeeks].sort();
      // Trova prima e ultima settimana
      let minD = "", maxD = "";
      MONTHS.forEach(({year,month}) => {
        const mKey = year+"-"+month;
        Object.keys(state.schedules[mKey]).filter(k=>k>=today).sort().forEach(k => {
          const d = new Date(k);
          const dow = (d.getDay()+6)%7;
          const mon = new Date(d); mon.setDate(d.getDate()-dow);
          const monKey = mon.getFullYear()+"-"+pad(mon.getMonth()+1)+"-"+pad(mon.getDate());
          if (sorted.includes(monKey)) {
            if (!minD || k < minD) minD = k;
            if (!maxD || k > maxD) maxD = k;
          }
        });
      });
      from = minD; to = maxD;
    }
    if (!from || !to) return [];
    return myUpcoming.filter(item => item.key >= from && item.key <= to);
  }

  const preview = getPreview();

  // Settimane disponibili
  const weeksMap = {};
  myUpcoming.forEach(item => {
    const d = new Date(item.key);
    const dow = (d.getDay()+6)%7;
    const mon = new Date(d); mon.setDate(d.getDate()-dow);
    const monKey = mon.getFullYear()+"-"+pad(mon.getMonth()+1)+"-"+pad(mon.getDate());
    if (!weeksMap[monKey]) weeksMap[monKey] = {monKey, days:[], label: mon.getDate()+" "+MS[mon.getMonth()]+" – "};
    weeksMap[monKey].days.push(item.key);
  });
  const weeks = Object.values(weeksMap).sort((a,b)=>a.monKey<b.monKey?-1:1);

  // Date min/max
  const workDates = myUpcoming.map(i=>i.key).sort();
  const minDate = workDates[0] || "";
  const maxDate = workDates[workDates.length-1] || "";

  const box = el("div", {style:{background:"#fff",borderRadius:"14px",boxShadow:"0 2px 16px rgba(0,0,0,0.06)",overflow:"hidden",marginBottom:"14px"}});
  box.appendChild(el("div", {style:{background:"#1A2744",padding:"12px 16px"}},
    el("div", {style:{fontWeight:"700",fontSize:"14px",color:"#fff"}}, "🏖️ Assenze — "+me.name),
    el("div", {style:{fontSize:"11px",color:"rgba(255,255,255,0.6)",marginTop:"2px"}}, "Registra giorni o periodi di assenza")
  ));

  const content = el("div", {style:{padding:"14px 16px"}});

  // 1. Tipo selezione
  content.appendChild(el("div", {style:{fontWeight:"700",fontSize:"12px",color:"#1A2744",marginBottom:"7px"}}, "Tipo di selezione"));
  const modeRow = el("div", {style:{display:"flex",gap:"6px",marginBottom:"14px"}});
  [{v:"single",label:"Giorno"},{v:"range",label:"Periodo"},{v:"weeks",label:"Settimane"}].forEach(opt => {
    modeRow.appendChild(el("button", {
      style:{flex:"1",padding:"7px 4px",borderRadius:"8px",border:"2px solid "+(form.mode===opt.v?"#1A2744":"#E8EEF5"),background:form.mode===opt.v?"#1A2744":"#fff",color:form.mode===opt.v?"#fff":"#555",fontWeight:"600",fontSize:"11px",cursor:"pointer"},
      onclick: () => { form.mode=opt.v; form.fromDate=""; form.toDate=""; form.selectedWeeks=[]; render(); }
    }, opt.label));
  });
  content.appendChild(modeRow);

  // 2. Motivo (tendina)
  content.appendChild(el("div", {style:{fontWeight:"700",fontSize:"12px",color:"#1A2744",marginBottom:"6px"}}, "Motivo dell'assenza"));
  const reasonRow = el("div", {style:{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"12px"}});
  const REASONS = [{v:"Ferie",icon:"🌴"},{v:"Congresso",icon:"🎓"},{v:"Malattia",icon:"🤒"},{v:"Altro",icon:"✏️"}];
  REASONS.forEach(r => {
    reasonRow.appendChild(el("button", {
      style:{padding:"6px 12px",borderRadius:"20px",border:"2px solid "+(form.reason===r.v?"#E74C3C":"#E8EEF5"),background:form.reason===r.v?"#FDECEA":"#fff",color:form.reason===r.v?"#C0392B":"#555",fontWeight:"600",fontSize:"11px",cursor:"pointer"},
      onclick: () => { form.reason=r.v; render(); }
    }, r.icon+" "+r.v));
  });
  content.appendChild(reasonRow);
  if (form.reason==="Altro") {
    const inp = el("input", {type:"text",placeholder:"Specifica il motivo...",style:{width:"100%",padding:"8px 10px",border:"1.5px solid #E8EEF5",borderRadius:"7px",fontSize:"12px",marginBottom:"12px",boxSizing:"border-box",outline:"none"}});
    inp.value = form.customReason || "";
    inp.addEventListener("input", e => { form.customReason = e.target.value; });
    content.appendChild(inp);
  }

  // 3. Selezione periodo
  if (form.mode==="single") {
    content.appendChild(el("div", {style:{fontWeight:"700",fontSize:"12px",color:"#1A2744",marginBottom:"6px"}}, "Seleziona il giorno"));
    const inp = el("input", {type:"date",min:minDate,max:maxDate,style:{width:"100%",padding:"9px 10px",border:"1.5px solid #E8EEF5",borderRadius:"8px",fontSize:"13px",outline:"none",marginBottom:"12px",boxSizing:"border-box"}});
    inp.value = form.fromDate;

  }

  box.appendChild(content);
  main.appendChild(box);
  return main;
}

function getMonthDataForKey(key) {
  const y = parseInt(key.slice(0,4));
  const m = parseInt(key.slice(5,7)) - 1;
  return state.schedules[y+"-"+m] || {};
}

function getAllSlotsOfDoctor(doctorId) {
  const result = [];
  MONTHS.forEach(({year,month}) => {
    const mKey = year+"-"+month;
    const md = state.schedules[mKey];
    if (!md) return;
    Object.keys(md).forEach(key => {
      const day = md[key];
      if (!day || !day.slots) return;
      (day.slots||[]).forEach((s,si) => {
        if (s.doctorId === doctorId) {
          result.push({mKey, dk:key, si, dayInfo:day, slot:s});
        }
      });
    });
  });
  return result;
}

        const toDoc = getDoc(toDoctor.id);
        const fromMKeyFinal = Object.keys(state.schedules).find(k=>state.schedules[k][fromDk])||"";
        if (toSlot.noSwap) {
          state.notifications.unshift({
            id: Date.now(), type:"cover", read:false,
            text: "🤝 "+fromDoc.name+" chiede a "+toDoc.name+" di coprire un turno",
            detail: fromDay.dayName+" "+fromDay.day+" · "+fromSlot.period+" · "+fi.label+" — senza turno in cambio",
            fromId: fromSlot.doctorId, toId: toDoctor.id,
            fromDk: fromDk, fromSi: fromSi, fromMKey: fromMKeyFinal,
            noSwap: true
          });
        } else {
          const ti = SHIFTS[toSlot.slot.shift];
          state.notifications.unshift({
            id: Date.now(), type:"swap", read:false,
            text: "🔄 "+fromDoc.name+" propone cambio con "+toDoc.name,
            detail: fromDay.dayName+" "+fromDay.day+" · "+fromSlot.period+" · "+fi.label+" ⇄ "+toSlot.dayInfo.dayName+" "+toSlot.dayInfo.day+" · "+toSlot.slot.period+" · "+ti.label,
            fromId: fromSlot.doctorId, toId: toDoctor.id,
            fromDk: fromDk, fromSi: fromSi, fromMKey: fromMKeyFinal,
            toDk: toSlot.dk, toSi: toSlot.si, toMKey: toSlot.mKey
          });
        }
        state.swapModal = null;
        scheduleSave();
        showToast("Proposta inviata! Il collega vedrà la notifica.");
        render();
      }
    }, toSlot && toSlot.noSwap ? "🤝 Chiedi copertura" : "✉️ Invia proposta di cambio"));
  }
  box.appendChild(btnRow);
  overlay.appendChild(box);
  return overlay;
}


function buildAbsenceModal(me, monthData) {
  const {dk: key, si} = state.absenceModal;
  const slot = monthData[key].slots[si];
  const dayInfo = monthData[key];
  const sl = SHIFTS[slot.shift];

  const overlay = el("div", {style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",zIndex:"300",display:"flex",alignItems:"center",justifyContent:"center"},onclick:()=>{state.absenceModal=null;render();}});
  const box = el("div", {style:{background:"#fff",borderRadius:"14px",padding:"22px",width:"340px",maxWidth:"95vw"},onclick:e=>e.stopPropagation()});

  box.appendChild(el("div", {style:{fontWeight:"800",fontSize:"15px",color:"#E74C3C",marginBottom:"4px"}}, "🚫 Segnala assenza"));
  box.appendChild(el("div", {style:{background:"#FDECEA",borderRadius:"9px",padding:"8px 11px",marginBottom:"12px"}},
    el("div", {style:{fontWeight:"700",fontSize:"12px",color:"#1A2744"}}, dayInfo.dayName+" "+dayInfo.day),
    el("div", {style:{fontSize:"10px",color:"#555",marginTop:"2px"}}, (slot.period==="mattina"?"☀️":"🌙")+" "+slot.period+" · "+sl.label)
  ));

  let selectedReason = "Ferie";
  const reasons = ["Ferie","Congresso","Malattia","Altro"];
  const reasonRow = el("div", {style:{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"12px"}});
  const btnMap = {};
  reasons.forEach(r => {
    const icons = {Ferie:"🌴",Congresso:"🎓",Malattia:"🤒",Altro:"✏️"};
    const rBtn = el("button", {
      style:{padding:"5px 10px",borderRadius:"20px",border:"2px solid "+(r==="Ferie"?"#E74C3C":"#E8EEF5"),background:r==="Ferie"?"#FDECEA":"#fff",color:r==="Ferie"?"#C0392B":"#555",fontWeight:"600",fontSize:"11px",cursor:"pointer"},
      onclick: () => {
        selectedReason = r;
        Object.entries(btnMap).forEach(([k,b]) => {
          b.style.border = k===r?"2px solid #E74C3C":"2px solid #E8EEF5";
          b.style.background = k===r?"#FDECEA":"#fff";
          b.style.color = k===r?"#C0392B":"#555";
        });
      }
    }, icons[r]+" "+r);
    btnMap[r] = rBtn;
    reasonRow.appendChild(rBtn);
  });
  box.appendChild(el("div", {style:{fontSize:"11px",fontWeight:"700",color:"#1A2744",marginBottom:"6px"}}, "Motivo"));
  box.appendChild(reasonRow);

  const btnRow = el("div", {style:{display:"flex",gap:"7px",marginTop:"12px"}});
  btnRow.appendChild(el("button", {style:{flex:"1",padding:"9px",border:"1.5px solid #E8EEF5",borderRadius:"8px",background:"#fff",cursor:"pointer",fontWeight:"600",fontSize:"12px"},onclick:()=>{state.absenceModal=null;render();}}, "Annulla"));
  btnRow.appendChild(el("button", {
    style:{flex:"1",padding:"9px",background:"#E74C3C",color:"#fff",border:"none",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"12px"},
    onclick: () => {
      slot.refusedBy = state.loggedInId;
      slot.refuseReason = selectedReason;
      slot.refused = true;
      slot.doctorId = null;
      state.absenceModal = null;
      scheduleSave();
      showToast("Assenza registrata.", "#E67E22");
      render();
    }
  }, "Conferma"));
  box.appendChild(btnRow);
  overlay.appendChild(box);
  return overlay;
}

function buildToast() {
  return el("div", {style:{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:state.toast.color,color:"#fff",borderRadius:"12px",padding:"11px 22px",fontWeight:"700",fontSize:"13px",boxShadow:"0 4px 20px rgba(0,0,0,0.2)",zIndex:"500"}}, state.toast.msg);
}

// ── AZIONI ────────────────────────────────────────────────────────────────────
function assignSelf(key, si) {
  const mKey = Object.keys(state.schedules).find(k => state.schedules[k][key]);
  if (mKey) {
    state.schedules[mKey][key].slots[si].doctorId = state.loggedInId;
    state.schedules[mKey][key].slots[si].refused = false;
  }
  scheduleSave();
  showToast("Slot assegnato!");
  render();
}

function approveSwap(notif) {
  try {
    const fromMKey = Object.keys(state.schedules).find(k => state.schedules[k][notif.fromDk]);
    if (!fromMKey) { showToast("Errore: turno non trovato","#E74C3C"); return; }
    const a = state.schedules[fromMKey][notif.fromDk].slots[notif.fromSi];
    if (!a) { showToast("Errore: slot non trovato","#E74C3C"); return; }

    if (notif.noSwap) {
      // Copertura: il collega prende il turno del richiedente
      a.doctorId = notif.toId;
      notif.read = true; notif.approved = true;
      scheduleSave();
      showToast("✓ Copertura confermata! Il turno è stato assegnato.");
    } else {
      const toMKey = Object.keys(state.schedules).find(k => state.schedules[k][notif.toDk]);
      if (!toMKey) { showToast("Errore: turno non trovato","#E74C3C"); return; }
      const b = state.schedules[toMKey][notif.toDk].slots[notif.toSi];
      if (!b) { showToast("Errore: slot non trovato","#E74C3C"); return; }
      const tmp = a.doctorId; a.doctorId = b.doctorId; b.doctorId = tmp;
      notif.read = true; notif.approved = true;
      scheduleSave();
      showToast("✓ Cambio effettuato! Il calendario è stato aggiornato.");
    }
    render();
  } catch(e) {
    showToast("Errore: "+e.message, "#E74C3C");
  }
}

function countEmpty(monthData) {
  let c = 0;
  Object.values(monthData).forEach(d => { if(d && d.slots) (d.slots||[]).forEach(s => { if(!s.doctorId) c++; }); });
  return c;
}

function showToast(msg, color="#27AE60") {
  state.toast = {msg, color};
  render();
  setTimeout(() => { state.toast = null; render(); }, 3000);
}

// ── AVVIO ─────────────────────────────────────────────────────────────────────
async function init() {
  state.loaded = true;
  render();
  // Carica da Firebase in background
  try {
    const data = await loadAll();
    if (data) {
      if (data.schedules) {
        MONTHS.forEach(({year,month}) => {
          const mKey = year+"-"+month;
          if (data.schedules[mKey]) {
            Object.keys(state.schedules[mKey]).forEach(key => {
              if (data.schedules[mKey][key]) {
                state.schedules[mKey][key].slots = data.schedules[mKey][key].slots;
              }
            });
          }
        });
      }
      if (data.notifications) state.notifications = data.notifications;
      render();
    }
  } catch(e) { console.log("Firebase non disponibile, uso dati locali"); }

  // Polling ogni 15 secondi
  setInterval(async () => {
    try {
      const data = await loadAll();
      if (!data) return;
      if (data.schedules) {
        MONTHS.forEach(({year,month}) => {
          const mKey = year+"-"+month;
          if (data.schedules[mKey]) {
            Object.keys(state.schedules[mKey]).forEach(key => {
              if (data.schedules[mKey][key]) state.schedules[mKey][key].slots = data.schedules[mKey][key].slots;
            });
          }
        });
      }
      if (data.notifications) state.notifications = data.notifications;
      render();
    } catch(e) {}
  }, 15000);
}

init();
</script>
